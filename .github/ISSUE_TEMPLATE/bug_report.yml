name: Bug report
description: Report a reproducible defect in Anduril
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Please do not use this form for security vulnerabilities. Follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest reliable reproduction you can.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
      description: Paste relevant logs, stack traces, or screenshots.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.0 or commit SHA
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local .NET run
        - Docker / Compose
        - CI
        - Other
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Share non-secret configuration details only.
      render: json
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues first
          required: true
        - label: I removed or redacted secrets from logs and config
          required: true

