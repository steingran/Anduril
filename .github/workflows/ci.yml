name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Anduril.slnx

      - name: Build
        run: dotnet build Anduril.slnx -c Release --no-restore

      - name: Test
        run: dotnet test --solution Anduril.slnx -c Release --no-build -- --report-trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: "**/*.trx"

