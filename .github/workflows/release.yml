name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            project: src/Anduril.App/Anduril.App.csproj
            exe: Anduril.App.exe
            channel: win
          - os: ubuntu-latest
            rid: linux-x64
            project: src/Anduril.App/Anduril.App.csproj
            exe: Anduril.App
            channel: linux
          - os: macos-latest
            rid: osx-x64
            project: src/Anduril.App/Anduril.App.csproj
            exe: Anduril.App
            channel: osx-x64
          - os: macos-latest
            rid: osx-arm64
            project: src/Anduril.App/Anduril.App.csproj
            exe: Anduril.App
            channel: osx-arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained
        run: >
          dotnet publish ${{ matrix.project }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish/${{ matrix.rid }}

      - name: Publish Setup tool
        run: >
          dotnet publish src/Anduril.Setup/Anduril.Setup.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish/${{ matrix.rid }}

      - name: Strip version prefix
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Package with Velopack
        run: >
          vpk pack
          --packId Anduril
          --packVersion ${{ env.VERSION }}
          --packDir ./publish/${{ matrix.rid }}
          --mainExe ${{ matrix.exe }}
          --channel ${{ matrix.channel }}
          --outputDir ./releases/${{ matrix.rid }}

      - name: Archive release payload
        shell: pwsh
        run: |
          $artifactDirectory = Join-Path $PWD "artifacts"
          New-Item -ItemType Directory -Path $artifactDirectory -Force | Out-Null

          $archivePath = Join-Path $artifactDirectory "Anduril-$env:VERSION-${{ matrix.rid }}.zip"
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive -Path "./releases/${{ matrix.rid }}/*" -DestinationPath $archivePath

          $hash = (Get-FileHash $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = "$archivePath.sha256"
          Set-Content -Path $checksumPath -Value "$hash  $(Split-Path $archivePath -Leaf)" -NoNewline

      - name: Generate release artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: ./artifacts/Anduril-${{ env.VERSION }}-${{ matrix.rid }}.zip

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.rid }}
          path: |
            ./artifacts/Anduril-${{ env.VERSION }}-${{ matrix.rid }}.zip
            ./artifacts/Anduril-${{ env.VERSION }}-${{ matrix.rid }}.zip.sha256
          if-no-files-found: error
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: publish
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          provenance: mode=max
          push: true
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/anduril:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/anduril:latest

      - name: Generate container image attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/anduril
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

  github-release:
    runs-on: ubuntu-latest
    needs: [publish, docker]
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ./artifacts

      - name: Consolidate checksums
        shell: bash
        run: |
          find ./artifacts -name '*.sha256' -print0 | sort -z | xargs -0 cat > ./artifacts/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: ./artifacts/**/*

