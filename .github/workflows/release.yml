name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            exe: Anduril.Host.exe
          - os: ubuntu-latest
            rid: linux-x64
            exe: Anduril.Host
          - os: macos-latest
            rid: osx-x64
            exe: Anduril.Host
          - os: macos-latest
            rid: osx-arm64
            exe: Anduril.Host

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained
        run: >
          dotnet publish src/Anduril.Host/Anduril.Host.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish/${{ matrix.rid }}

      - name: Strip version prefix
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Package with Velopack
        run: >
          vpk pack
          --packId Anduril
          --packVersion ${{ env.VERSION }}
          --packDir ./publish/${{ matrix.rid }}
          --mainExe ${{ matrix.exe }}
          --outputDir ./releases/${{ matrix.rid }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.rid }}
          path: ./releases/${{ matrix.rid }}

  docker:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/anduril:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/anduril:latest

  github-release:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/**/*

